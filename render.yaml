services:
  - type: web
    name: kibby-kib
    env: static
    rootDir: artifacts/kibby-kib
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install && pnpm --filter @workspace/kibby-kib run build
    staticPublishPath: dist/public
    envVars:
      - key: PORT
        value: 3000
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html